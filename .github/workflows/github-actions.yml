name: Info Malang Batu

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decrypt API keys
        run: gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" --decrypt api-key.properties.gpg > api-key.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Android APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 14

  ios-build:
    runs-on: macos-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decrypt API keys
        run: gpg --batch --yes --passphrase "${{ secrets.GPG_PASSPHRASE }}" --decrypt api-key.properties.gpg > api-key.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Kotlin Framework
        run: ./gradlew composeApp:linkReleaseFrameworkIosSimulatorArm64 --stacktrace

      - name: Build iOS App
        run: |
          xcodebuild -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath build \
            -skipPackagePluginUpdates \
            build

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/Build/Products/Release-iphonesimulator/iosApp.app
          retention-days: 14